<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ja-Chan Lu: Contact</title>
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="../global.js"></script>
  </head>
  <body>

    <h1>Contact Me</h1>

    <form action="mailto:jachanlu056@gmail.com" method="POST" enctype="text/plain">
      <label>
        Your Email:
        <input type="email" name="email" />
      </label>
      <label>
        Subject:
        <input name="subject" />
      </label>
      <label>
        Message:
        <textarea name="body" rows="6"></textarea>
      </label>
      <button type="submit">Send Message</button>
    </form>
  </body>
</html>
